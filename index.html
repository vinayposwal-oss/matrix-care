<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Love Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = "010101ABCDEFGHIJKLMNOPQRSTUVWXYZ💘❤️✨";
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const rainDrops = Array(columns).fill(1);

        let startTime = Date.now();
        let currentSequence = 0; 
        const sequenceTimeline = [
            { time: 0, type: 'rain' },
            { time: 2000, type: 'text', value: '3' },
            { time: 3500, type: 'text', value: '2' },
            { time: 5000, type: 'text', value: '1' },
            { time: 6500, type: 'text', value: 'You' },
            { time: 8000, type: 'text', value: 'Are' },
            { time: 9500, type: 'text', value: 'My' },
            { time: 11000, type: 'text', value: 'Love' },
            { time: 12500, type: 'final' } // Triggers clean final message
        ];

        // Advanced multi-line canvas pixel sampler
        function getShapePointsMultiLine(lines) {
            const points = [];
            const memCanvas = document.createElement('canvas');
            const memCtx = memCanvas.getContext('2d');
            memCanvas.width = canvas.width;
            memCanvas.height = canvas.height;

            memCtx.fillStyle = '#fff';
            memCtx.textAlign = 'center';
            memCtx.textBaseline = 'middle';

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            if (lines.length === 1) {
                // Formatting for standard single words (3, 2, 1, You...)
                const dynamicSize = Math.min(canvas.width * 0.23, 200);
                memCtx.font = `bold ${dynamicSize}px sans-serif`;
                memCtx.fillText(lines[0], cx, cy);
            } else {
                // Line 1: "I LOVE YOU" (Bold, prominent, stylized like 'Love')
                const sizeLine1 = Math.min(canvas.width * 0.14, 110);
                memCtx.font = `bold ${sizeLine1}px sans-serif`;
                memCtx.fillText(lines[0], cx, cy - (sizeLine1 * 0.6));

                // Line 2: "PRACHI" (Slightly smaller, tracked cleanly right beneath)
                const sizeLine2 = Math.min(canvas.width * 0.11, 85);
                memCtx.font = `bold ${sizeLine2}px sans-serif`;
                memCtx.fillText(lines[1], cx, cy + (sizeLine2 * 0.7));
            }

            const imgData = memCtx.getImageData(0, 0, canvas.width, canvas.height).data;
            const step = 6; // Tight grid spacing for immaculate letter sharpness

            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const alphaIndex = ((y * canvas.width) + x) * 4 + 3;
                    if (imgData[alphaIndex] > 128) {
                        points.push({ x: x + (Math.random() * 1.5 - 0.75), y: y + (Math.random() * 1.5 - 0.75) });
                    }
                }
            }
            return points;
        }

        let currentTargets = [];

        function updateTimeline() {
            const elapsed = Date.now() - startTime;
            let activeIndex = 0;

            for (let i = 0; i < sequenceTimeline.length; i++) {
                if (elapsed >= sequenceTimeline[i].time) {
                    activeIndex = i;
                }
            }

            if (activeIndex !== currentSequence) {
                currentSequence = activeIndex;
                const current = sequenceTimeline[currentSequence];

                if (current.type === 'text') {
                    currentTargets = getShapePointsMultiLine([current.value]);
                } else if (current.type === 'final') {
                    // Splitting into clean vector rows for distinct tracking
                    currentTargets = getShapePointsMultiLine(["I LOVE YOU", "PRACHI ❤️"]);
                } else {
                    currentTargets = [];
                }
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            updateTimeline();
            const currentStage = sequenceTimeline[currentSequence];

            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < rainDrops.length; i++) {
                const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillStyle = (Math.random() > 0.98) ? '#fff' : 'rgba(230, 40, 110, 0.18)';
                ctx.fillText(char, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }

            if (currentStage.type === 'text' || currentStage.type === 'final') {
                ctx.font = 'bold 14px monospace';
                
                currentTargets.forEach(pt => {
                    const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                    ctx.fillStyle = (Math.random() > 0.78) ? '#ffffff' : '#ffb6c1';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#e6286e';
                    ctx.fillText(char, pt.x, pt.y);
                    ctx.shadowBlur = 0; 
                });
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
